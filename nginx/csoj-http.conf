# CSOJ Nginx 反向代理配置（HTTP 版本）
# 用于本地开发或测试环境

# 上游服务器配置
upstream csoj_backend {
    server backend:8121 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

upstream csoj_frontend {
    server frontend:80 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

# HTTP 服务器配置
server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # 日志配置
    access_log /var/log/nginx/csoj_access.log;
    error_log /var/log/nginx/csoj_error.log;

    # 客户端上传大小限制
    client_max_body_size 100M;
    client_body_timeout 300s;
    client_header_timeout 300s;

    # 后端 API 代理
    location /api/ {
        proxy_pass http://csoj_backend/api/;
        proxy_http_version 1.1;

        # 代理头部
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时配置
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # WebSocket 支持
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # 文件上传代理
    location /file/ {
        proxy_pass http://csoj_backend/file/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # 上传大文件配置
        client_max_body_size 100M;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # 前端静态文件代理
    location / {
        proxy_pass http://csoj_frontend/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
