<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <!-- 背景 -->
  <rect width="800" height="500" fill="#f8f9fa" />
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">Docker容器化执行环境</text>
  
  <!-- Docker Host 外框 -->
  <rect x="100" y="80" width="600" height="380" rx="10" ry="10" fill="#f5f5f5" stroke="#263238" stroke-width="2" />
  <text x="400" y="110" font-family="Arial" font-size="20" text-anchor="middle" font-weight="bold">Docker Host</text>
  
  <!-- 容器1 -->
  <rect x="150" y="140" width="140" height="100" rx="5" ry="5" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="220" y="170" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Container 1</text>
  <text x="220" y="200" font-family="Arial" font-size="14" text-anchor="middle">(Java Code)</text>
  
  <!-- 容器2 -->
  <rect x="330" y="140" width="140" height="100" rx="5" ry="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="400" y="170" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Container 2</text>
  <text x="400" y="200" font-family="Arial" font-size="14" text-anchor="middle">(Python Code)</text>
  
  <!-- 容器3 -->
  <rect x="510" y="140" width="140" height="100" rx="5" ry="5" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="580" y="170" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Container 3</text>
  <text x="580" y="200" font-family="Arial" font-size="14" text-anchor="middle">(C++ Code)</text>
  
  <!-- 资源限制 -->
  <rect x="150" y="270" width="500" height="60" rx="5" ry="5" fill="#e0f7fa" stroke="#006064" stroke-width="2" />
  <text x="400" y="305" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Resource Limits (CPU, Memory, Time)</text>
  
  <!-- 安全约束 -->
  <rect x="150" y="360" width="500" height="60" rx="5" ry="5" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="400" y="395" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">Security Constraints</text>
  
  <!-- Docker Logo -->
  <svg x="650" y="80" width="40" height="40" viewBox="0 0 24 24">
