  </svg>
  
  <!-- 图例 -->
  <rect x="600" y="20" width="180" height="50" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" />
  <text x="690" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">隔离执行环境</text>
  
  <rect x="620" y="55" width="20" height="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="690" y="65" font-family="Arial" font-size="12" text-anchor="middle">独立容器</text>
</svg>