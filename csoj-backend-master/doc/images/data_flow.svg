<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">在线判题系统数据流程图</text>
  
  <!-- 用户 -->
  <rect x="50" y="100" width="120" height="60" rx="10" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="110" y="140" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">用户</text>
  
  <!-- 前端应用 -->
  <rect x="250" y="100" width="120" height="60" rx="10" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="310" y="140" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">前端应用</text>
  
  <!-- 后端API -->
  <rect x="450" y="100" width="120" height="60" rx="10" ry="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="510" y="140" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">后端API</text>
  
  <!-- 代码沙箱 -->
  <rect x="650" y="100" width="120" height="60" rx="10" ry="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="710" y="140" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">代码沙箱</text>
  
  <!-- 判题核心 -->
  <rect x="650" y="220" width="120" height="60" rx="10" ry="10" fill="#e0f7fa" stroke="#006064" stroke-width="2" />
  <text x="710" y="260" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">判题核心</text>
  
  <!-- 数据库 -->
  <rect x="450" y="220" width="120" height="60" rx="10" ry="10" fill="#f3e5f5" stroke="#6a1b9a" stroke-width="2" />
  <text x="510" y="260" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">数据库</text>
  
  <!-- 结果处理 -->
  <rect x="650" y="340" width="120" height="60" rx="10" ry="10" fill="#e0f7fa" stroke="#006064" stroke-width="2" />
  <text x="710" y="380" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">结果处理</text>
  
  <!-- 积分系统 -->
  <rect x="450" y="340" width="120" height="60" rx="10" ry="10" fill="#ede7f6" stroke="#4527a0" stroke-width="2" />
  <text x="510" y="380" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">积分系统</text>
  
  <!-- 排行榜 -->
  <rect x="250" y="340" width="120" height="60" rx="10" ry="10" fill="#ede7f6" stroke="#4527a0" stroke-width="2" />
  <text x="310" y="380" font-family="Arial" font-size="16" text-anchor="middle" font-weight="bold">排行榜</text>
  
  <!-- 连接线 -->
  <!-- 用户到前端 -->
  <line x1="170" y1="130" x2="250" y2="130" stroke="#424242" stroke-width="2" />
  <polygon points="245,125 255,130 245,135" fill="#424242" />
  
  <!-- 前端到后端 -->
  <line x1="370" y1="130" x2="450" y2="130" stroke="#424242" stroke-width="2" />
  <polygon points="445,125 455,130 445,135" fill="#424242" />
  
  <!-- 后端到代码沙箱 -->
  <line x1="570" y1="130" x2="650" y2="130" stroke="#424242" stroke-width="2" />
  <polygon points="645,125 655,130 645,135" fill="#424242" />
  
  <!-- 代码沙箱到判题核心 -->
  <line x1="710" y1="160" x2="710" y2="220" stroke="#424242" stroke-width="2" />
  <polygon points="705,215 710,225 715,215" fill="#424242" />
  
  <!-- 判题核心到结果处理 -->
  <line x1="710" y1="280" x2="710" y2="340" stroke="#424242" stroke-width="2" />
  <polygon points="705,335 710,345 715,335" fill="#424242" />
  
  <!-- 结果处理到积分系统 -->
  <line x1="650" y1="370" x2="570" y2="370" stroke="#424242" stroke-width="2" />
  <polygon points="575,365 565,370 575,375" fill="#424242" />
  
  <!-- 积分系统到排行榜 -->
  <line x1="450" y1="370" x2="370" y2="370" stroke="#424242" stroke-width="2" />
  <polygon points="375,365 365,370 375,375" fill="#424242" />
  
  <!-- 后端到数据库 -->
  <line x1="510" y1="160" x2="510" y2="220" stroke="#424242" stroke-width="2" />
  <polygon points="505,215 510,225 515,215" fill="#424242" />
  
  <!-- 结果处理到数据库 -->
  <line x1="650" y1="370" x2="510" y2="280" stroke="#424242" stroke-width="2" />
  <polygon points="515,285 505,275 505,285" fill="#424242" />
  
  <!-- 数据库到积分系统 -->
  <line x1="510" y1="280" x2="510" y2="340" stroke="#424242" stroke-width="2" />
  <polygon points="505,335 510,345 515,335" fill="#424242" />
  
  <!-- 流程说明 -->
  <text x="400" y="450" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">代码提交与评判流程</text>
  
  <text x="400" y="480" font-family="Arial" font-size="14" text-anchor="middle">1. 用户提交代码</text>
  <text x="400" y="505" font-family="Arial" font-size="14" text-anchor="middle">2. 前端应用将代码发送至后端API</text>
  <text x="400" y="530" font-family="Arial" font-size="14" text-anchor="middle">3. 后端API将代码发送至代码沙箱执行</text>
  <text x="400" y="555" font-family="Arial" font-size="14" text-anchor="middle">4. 判题核心评估执行结果</text>
  <text x="400" y="580" font-family="Arial" font-size="14" text-anchor="middle">5. 结果处理后更新数据库并触发积分变动</text>
</svg>