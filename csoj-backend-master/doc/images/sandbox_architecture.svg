<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">代码沙箱架构图</text>
  
  <!-- 接口层 -->
  <rect x="100" y="100" width="600" height="100" rx="10" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="400" y="130" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">代码沙箱接口层</text>
  
  <rect x="150" y="150" width="500" height="40" rx="5" ry="5" fill="#bbdefb" stroke="#1565c0" stroke-width="1" />
  <text x="400" y="175" font-family="Arial" font-size="16" text-anchor="middle">CodeSandbox 接口</text>
  
  <!-- 连接线 -->
  <line x1="400" y1="200" x2="400" y2="220" stroke="#424242" stroke-width="2" />
  <polygon points="395,215 400,225 405,215" fill="#424242" />
  <polygon points="395,205 400,195 405,205" fill="#424242" />
  
  <!-- 策略层 -->
  <rect x="100" y="230" width="600" height="180" rx="10" ry="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="400" y="260" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">代码沙箱策略层</text>
  
  <!-- 第一行策略 -->
  <rect x="150" y="280" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="210" y="305" font-family="Arial" font-size="14" text-anchor="middle">Java策略</text>
  
  <rect x="340" y="280" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="400" y="305" font-family="Arial" font-size="14" text-anchor="middle">Python策略</text>
  
  <rect x="530" y="280" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="590" y="305" font-family="Arial" font-size="14" text-anchor="middle">C++策略</text>
  
  <!-- 第二行策略 -->
  <rect x="150" y="340" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="210" y="365" font-family="Arial" font-size="14" text-anchor="middle">Go策略</text>
  
  <rect x="340" y="340" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="400" y="365" font-family="Arial" font-size="14" text-anchor="middle">JavaScript策略</text>
  
  <rect x="530" y="340" width="120" height="40" rx="5" ry="5" fill="#c8e6c9" stroke="#2e7d32" stroke-width="1" />
  <text x="590" y="365" font-family="Arial" font-size="14" text-anchor="middle">其他语言策略</text>
  
  <!-- 连接线 -->
  <line x1="400" y1="410" x2="400" y2="430" stroke="#424242" stroke-width="2" />
  <polygon points="395,425 400,435 405,425" fill="#424242" />
  <polygon points="395,415 400,405 405,415" fill="#424242" />
  
  <!-- 工厂层 -->
  <rect x="100" y="440" width="600" height="100" rx="10" ry="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="400" y="470" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">代码沙箱工厂层</text>
  
  <rect x="150" y="490" width="500" height="40" rx="5" ry="5" fill="#ffe0b2" stroke="#e65100" stroke-width="1" />
  <text x="400" y="515" font-family="Arial" font-size="16" text-anchor="middle">CodeSandboxFactory</text>
  
  <!-- 图例 -->
  <rect x="600" y="20" width="180" height="70" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" />
  <text x="690" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">图例</text>
  
  <rect x="620" y="55" width="20" height="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="1" />
  <text x="690" y="65" font-family="Arial" font-size="12" text-anchor="middle">接口层</text>
  
  <rect x="620" y="75" width="20" height="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1" />
  <text x="690" y="85" font-family="Arial" font-size="12" text-anchor="middle">策略层</text>
  
  <rect x="620" y="95" width="20" height="10" fill="#fff3e0" stroke="#e65100" stroke-width="1" />
  <text x="690" y="105" font-family="Arial" font-size="12" text-anchor="middle">工厂层</text>
</svg>