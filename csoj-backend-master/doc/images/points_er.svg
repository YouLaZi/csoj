<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">积分系统实体关系图</text>
  
  <!-- User实体 -->
  <rect x="100" y="100" width="200" height="180" rx="10" ry="10" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" />
  <text x="200" y="130" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">User</text>
  <line x1="100" y1="140" x2="300" y2="140" stroke="#1565c0" stroke-width="1" />
  
  <text x="120" y="170" font-family="Arial" font-size="14">id</text>
  <text x="120" y="200" font-family="Arial" font-size="14">userName</text>
  <text x="120" y="230" font-family="Arial" font-size="14">userAccount</text>
  <text x="120" y="260" font-family="Arial" font-size="14">userPassword</text>
  
  <!-- UserPoints实体 -->
  <rect x="500" y="100" width="200" height="180" rx="10" ry="10" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" />
  <text x="600" y="130" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">UserPoints</text>
  <line x1="500" y1="140" x2="700" y2="140" stroke="#2e7d32" stroke-width="1" />
  
  <text x="520" y="170" font-family="Arial" font-size="14">id</text>
  <text x="520" y="200" font-family="Arial" font-size="14">userId</text>
  <text x="520" y="230" font-family="Arial" font-size="14">totalPoints</text>
  <text x="520" y="260" font-family="Arial" font-size="14">updateTime</text>
  
  <!-- PointsRecord实体 -->
  <rect x="500" y="350" width="200" height="200" rx="10" ry="10" fill="#fff3e0" stroke="#e65100" stroke-width="2" />
  <text x="600" y="380" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">PointsRecord</text>
  <line x1="500" y1="390" x2="700" y2="390" stroke="#e65100" stroke-width="1" />
  
  <text x="520" y="420" font-family="Arial" font-size="14">id</text>
  <text x="520" y="450" font-family="Arial" font-size="14">userId</text>
  <text x="520" y="480" font-family="Arial" font-size="14">points</text>
  <text x="520" y="510" font-family="Arial" font-size="14">type</text>
  <text x="520" y="540" font-family="Arial" font-size="14">description</text>
  
  <!-- UserCheckin实体 -->
  <rect x="100" y="350" width="200" height="180" rx="10" ry="10" fill="#e0f7fa" stroke="#006064" stroke-width="2" />
  <text x="200" y="380" font-family="Arial" font-size="18" text-anchor="middle" font-weight="bold">UserCheckin</text>
  <line x1="100" y1="390" x2="300" y2="390" stroke="#006064" stroke-width="1" />
  
  <text x="120" y="420" font-family="Arial" font-size="14">id</text>
  <text x="120" y="450" font-family="Arial" font-size="14">userId</text>
  <text x="120" y="480" font-family="Arial" font-size="14">checkinDate</text>
  <text x="120" y="510" font-family="Arial" font-size="14">createTime</text>
  
  <!-- 关系线 -->
  <!-- User到UserPoints -->
  <line x1="300" y1="170" x2="500" y2="200" stroke="#424242" stroke-width="2" />
  <polygon points="495,195 505,205 505,195" fill="#424242" />
  <text x="400" y="170" font-family="Arial" font-size="14" text-anchor="middle">1:1</text>
  
  <!-- User到PointsRecord -->
  <line x1="200" y1="280" x2="500" y2="450" stroke="#424242" stroke-width="2" />
  <polygon points="495,445 505,455 505,445" fill="#424242" />
  <text x="350" y="370" font-family="Arial" font-size="14" text-anchor="middle">1:n</text>
  
  <!-- User到UserCheckin -->
  <line x1="200" y1="280" x2="200" y2="350" stroke="#424242" stroke-width="2" />
  <polygon points="195,345 200,355 205,345" fill="#424242" />
  <text x="220" y="320" font-family="Arial" font-size="14" text-anchor="middle">1:n</text>
  
  <!-- UserCheckin到PointsRecord -->
  <line x1="300" y1="450" x2="500" y2="450" stroke="#424242" stroke-width="2" stroke-dasharray="5,5" />
  <polygon points="495,445 505,455 495,455" fill="#424242" />
  <text x="400" y="430" font-family="Arial" font-size="14" text-anchor="middle">触发</text>
  
  <!-- 图例 -->
  <rect x="600" y="20" width="180" height="60" fill="#ffffff" stroke="#bdbdbd" stroke-width="1" />
  <text x="690" y="40" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">关系类型</text>
  
  <line x1="620" y1="60" x2="650" y2="60" stroke="#424242" stroke-width="2" />
  <text x="690" y="65" font-family="Arial" font-size="12" text-anchor="middle">一对多关系 (1:n)</text>
  
  <line x1="620" y1="80" x2="650" y2="80" stroke="#424242" stroke-width="2" stroke-dasharray="5,5" />
  <text x="690" y="85" font-family="Arial" font-size="12" text-anchor="middle">关联关系</text>
</svg>