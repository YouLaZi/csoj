# CSOJ 后端服务 Docker Compose 配置
# 适用于 ARM64 架构 (Apple Silicon M1/M2/M3, AWS Graviton, 树莓派等)
# Docker Desktop 快速部署版本

version: '3.8'

services:
  # ============================================
  # MySQL 数据库
  # ============================================
  mysql:
    image: mysql:8.0
    platform: linux/arm64
    container_name: csoj-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-csoj123456}
      MYSQL_DATABASE: oj_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
      - --max_connections=500
      - --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-csoj123456}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - csoj-network

  # ============================================
  # Redis 缓存
  # ============================================
  redis:
    image: redis:7-alpine
    platform: linux/arm64
    container_name: csoj-redis
    restart: unless-stopped
    environment:
      TZ: Asia/Shanghai
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - csoj-network

  # ============================================
  # Elasticsearch 搜索引擎
  # ============================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    platform: linux/arm64
    container_name: csoj-elasticsearch
    restart: unless-stopped
    environment:
      - node.name=csoj-es01
      - cluster.name=csoj-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - TZ=Asia/Shanghai
    ports:
      - "${ES_PORT:-9200}:9200"
      - "9300:9300"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - csoj-network

  # ============================================
  # CSOJ 后端应用
  # ============================================
  csoj-backend:
    build:
      context: .
      dockerfile: Dockerfile.arm64
    platform: linux/arm64
    container_name: csoj-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    environment:
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/oj_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-csoj123456}
      # Redis 配置
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      SPRING_REDIS_DATABASE: 1
      # Elasticsearch 配置
      SPRING_ELASTICSEARCH_URIS: http://elasticsearch:9200
      # JVM 配置
      JAVA_OPTS: -Xms512m -Xmx1024m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
      # Spring Profile
      SPRING_PROFILES_ACTIVE: docker
      # 时区
      TZ: Asia/Shanghai
      # CORS 配置（根据需要修改）
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
    ports:
      - "${APP_PORT:-8121}:8121"
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8121/api/system/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - csoj-network

  # ============================================
  # 可选: Prometheus 监控
  # ============================================
  prometheus:
    image: prom/prometheus:v2.48.0
    platform: linux/arm64
    container_name: csoj-prometheus
    restart: unless-stopped
    profiles:
      - monitoring
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - csoj-network

  # ============================================
  # 可选: Grafana 可视化
  # ============================================
  grafana:
    image: grafana/grafana:10.2.0
    platform: linux/arm64
    container_name: csoj-grafana
    restart: unless-stopped
    profiles:
      - monitoring
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: ""
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - csoj-network

# ============================================
# 网络配置
# ============================================
networks:
  csoj-network:
    driver: bridge
    name: csoj-network

# ============================================
# 数据卷
# ============================================
volumes:
  mysql_data:
    name: csoj-mysql-data
  redis_data:
    name: csoj-redis-data
  es_data:
    name: csoj-es-data
  app_logs:
    name: csoj-app-logs
  app_uploads:
    name: csoj-app-uploads
  prometheus_data:
    name: csoj-prometheus-data
  grafana_data:
    name: csoj-grafana-data
