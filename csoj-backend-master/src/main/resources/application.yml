# 公共配置文件
spring:
  application:
    name: csoj-backend
  # 默认 dev 环境
  profiles:
    active: dev
  # 允许循环依赖（临时解决方案）
  main:
    allow-circular-references: true
  # 支持 swagger3
  mvc:
    pathmatch:
      matching-strategy: ant_path_matcher
  # session 配置
  session:
    # todo 取消注释开启分布式 session（须先配置 Redis）
    store-type: redis
    # 30 天过期
    timeout: 2592000
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj_db
    username: root
    password:
  # Redis 配置
  # todo 需替换配置，然后取消注释
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
#    password: 123456
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9201
  # 文件上传
  servlet:
    multipart:
      # 大小限制
      max-file-size: 10MB
server:
  address: 0.0.0.0
  port: 8121
  # Tomcat 线程池配置（支持更多并发请求）
  tomcat:
    threads:
      # 最大工作线程数
      max: ${TOMCAT_MAX_THREADS:200}
      # 最小空闲线程数
      min-spare: ${TOMCAT_MIN_SPARE_THREADS:10}
    # 最大连接数
    max-connections: ${TOMCAT_MAX_CONNECTIONS:10000}
    # 接受队列大小
    accept-count: ${TOMCAT_ACCEPT_COUNT:100}
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    # 日志输出由 logback-spring.xml 统一管理
  global-config:
    db-config:
      logic-delete-field: isDelete # 全局逻辑删除的实体字段名
      logic-delete-value: 1 # 逻辑已删除值（默认为 1）
      logic-not-delete-value: 0 # 逻辑未删除值（默认为 0）
