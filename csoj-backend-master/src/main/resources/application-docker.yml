# Docker 环境配置文件
server:
  port: 8121

spring:
  # 数据库配置（通过环境变量覆盖）
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/oj_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:csoj123456}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # Redis 配置（通过环境变量覆盖）
  redis:
    database: ${SPRING_REDIS_DATABASE:1}
    host: ${SPRING_REDIS_HOST:redis}
    port: ${SPRING_REDIS_PORT:6379}
    timeout: 5000
    password: ${SPRING_REDIS_PASSWORD:}

  # Elasticsearch 配置（通过环境变量覆盖）
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS:http://elasticsearch:9200}
    username: ${SPRING_ELASTICSEARCH_USERNAME:}
    password: ${SPRING_ELASTICSEARCH_PASSWORD:}

  # Session 配置
  session:
    store-type: redis
    timeout: 86400

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB

# MyBatis Plus 配置
mybatis-plus:
  configuration:
    log-impl: ''
  global-config:
    db-config:
      logic-delete-field: isDelete
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置
logging:
  level:
    root: INFO
    com.oj.cs: INFO
  file:
    path: /app/logs
    name: /app/logs/csoj.log

# CORS 配置
cors:
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:*}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600
  exposed-headers:
    - Content-Disposition
    - Authorization

# Actuator 配置（健康检查和监控）
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when_authorized
  metrics:
    tags:
      application: csoj-backend

# 代码沙箱配置
code-sandbox:
  type: ${CODE_SANDBOX_TYPE:remote}
  host: ${CODE_SANDBOX_HOST:}
  port: ${CODE_SANDBOX_PORT:}
