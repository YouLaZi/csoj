# 线上配置文件
server:
  port: 8101
spring:
  # 数据库配置
  # todo 需替换配置
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/oj_db
    username: root
    password:
  # Redis 配置
  # todo 需替换配置
  redis:
    database: 1
    host: localhost
    port: 6379
    timeout: 5000
    password:
  # Elasticsearch 配置
  # todo 需替换配置
  elasticsearch:
    uris: http://localhost:9200
    username: root
    password: 123456
mybatis-plus:
  configuration:
    # 生产环境关闭日志
    log-impl: ''

# 生产环境 CORS 配置（安全加固）
# 请根据实际部署域名修改 allowed-origins
cors:
  # 生产环境只允许指定域名访问，不使用通配符
  # 建议使用环境变量覆盖：CORS_ALLOWED_ORIGINS=https://csoj.school.edu.cn,https://*.edu.cn
  allowed-origins:
    - ${CORS_ALLOWED_ORIGINS:https://csoj.example.com}
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed-headers: "*"
  allow-credentials: true
  max-age: 3600
  exposed-headers:
    - Content-Disposition
    - Authorization