# 测试环境配置
spring:
  main:
    allow-circular-references: true
  # 排除 WebSocket 自动配置
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.websocket.servlet.WebSocketServletAutoConfiguration
  # Elasticsearch 配置
  elasticsearch:
    uris: http://localhost:9201

# 禁用 WebSocket ServerEndpoint
websocket:
  enabled: false

# 使用示例沙箱进行测试
codesandbox:
  type: example
