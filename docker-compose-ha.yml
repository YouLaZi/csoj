# Docker Compose 配置 - 高可用版本（主从复制、多实例）
# version: '3.8'

services:
  # MySQL 主库
  mysql-master:
    image: mysql:8.0
    container_name: csoj-mysql-master
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-oj_db}
      MYSQL_USER: ${MYSQL_USER:-oj_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-oj_password}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_MASTER_PORT:-3306}:3306"
    volumes:
      - mysql-master-data:/var/lib/mysql
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./docker/mysql/master.cnf:/etc/mysql/conf.d/master.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - csoj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL 从库
  mysql-slave:
    image: mysql:8.0
    container_name: csoj-mysql-slave
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_SLAVE_PORT:-3307}:3306"
    volumes:
      - mysql-slave-data:/var/lib/mysql
      - ./docker/mysql/slave.cnf:/etc/mysql/conf.d/slave.cnf:ro
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - csoj-network
    depends_on:
      mysql-master:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Sentinel (高可用)
  redis-master:
    image: redis:7-alpine
    container_name: csoj-redis-master
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_MASTER_PORT:-6379}:6379"
    volumes:
      - redis-master-data:/data
    networks:
      - csoj-network

  redis-slave-1:
    image: redis:7-alpine
    container_name: csoj-redis-slave-1
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-} --slaveof redis-master 6379 --masterauth ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_SLAVE1_PORT:-6380}:6379"
    volumes:
      - redis-slave-1-data:/data
    networks:
      - csoj-network
    depends_on:
      - redis-master

  redis-sentinel-1:
    image: redis:7-alpine
    container_name: csoj-redis-sentinel-1
    restart: unless-stopped
    command: redis-sentinel /etc/redis/sentinel.conf
    ports:
      - "${REDIS_SENTINEL1_PORT:-26379}:26379"
    volumes:
      - ./docker/redis/sentinel.conf:/etc/redis/sentinel.conf:ro
    networks:
      - csoj-network
    depends_on:
      - redis-master

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: csoj-rabbitmq
    restart: unless-stopped
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - csoj-network
    healthcheck:
      test: ["CMD", "rabbit-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 后端服务实例 1
  backend-1:
    build:
      context: ./csoj-backend-master
      dockerfile: Dockerfile
    container_name: csoj-backend-1
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT_1:-8121}:8121"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/${MYSQL_DATABASE:-oj_db}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/${MYSQL_DATABASE:-oj_db}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-oj_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-oj_password}
      SPRING_REDIS_HOST: redis-sentinel-1
      SPRING_REDIS_PORT: 26379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SENTINEL_MASTER: mymaster
      CODE_SANDBOX_SECRET: ${CODE_SANDBOX_SECRET:-your-secret-key-here}
      FILE_UPLOAD_PATH: /app/uploads
      FILE_URL_PREFIX: /api/files
      ASYNC_JUDGE_CORE_POOL_SIZE: ${ASYNC_JUDGE_CORE_POOL_SIZE:-10}
      ASYNC_JUDGE_MAX_POOL_SIZE: ${ASYNC_JUDGE_MAX_POOL_SIZE:-20}
      ASYNC_JUDGE_QUEUE_CAPACITY: ${ASYNC_JUDGE_QUEUE_CAPACITY:-200}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-200}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS:-10000}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
    volumes:
      - backend-logs-1:/app/logs
      - backend-uploads:/app/uploads
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
    networks:
      - csoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8121/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端服务实例 2
  backend-2:
    build:
      context: ./csoj-backend-master
      dockerfile: Dockerfile
    container_name: csoj-backend-2
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT_2:-8122}:8121"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_MASTER_URL: jdbc:mysql://mysql-master:3306/${MYSQL_DATABASE:-oj_db}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_SLAVE_URL: jdbc:mysql://mysql-slave:3306/${MYSQL_DATABASE:-oj_db}?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-oj_user}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-oj_password}
      SPRING_REDIS_HOST: redis-sentinel-1
      SPRING_REDIS_PORT: 26379
      SPRING_REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_SENTINEL_MASTER: mymaster
      CODE_SANDBOX_SECRET: ${CODE_SANDBOX_SECRET:-your-secret-key-here}
      FILE_UPLOAD_PATH: /app/uploads
      FILE_URL_PREFIX: /api/files
      ASYNC_JUDGE_CORE_POOL_SIZE: ${ASYNC_JUDGE_CORE_POOL_SIZE:-10}
      ASYNC_JUDGE_MAX_POOL_SIZE: ${ASYNC_JUDGE_MAX_POOL_SIZE:-20}
      ASYNC_JUDGE_QUEUE_CAPACITY: ${ASYNC_JUDGE_QUEUE_CAPACITY:-200}
      TOMCAT_MAX_THREADS: ${TOMCAT_MAX_THREADS:-200}
      TOMCAT_MAX_CONNECTIONS: ${TOMCAT_MAX_CONNECTIONS:-10000}
      TOMCAT_ACCEPT_COUNT: ${TOMCAT_ACCEPT_COUNT:-100}
    volumes:
      - backend-logs-2:/app/logs
      - backend-uploads:/app/uploads
    depends_on:
      mysql-master:
        condition: service_healthy
      mysql-slave:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis-sentinel-1:
        condition: service_started
    networks:
      - csoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8121/api/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 代码沙箱服务
  sandbox:
    build:
      context: ./csoj-code-sandbox-master
      dockerfile: Dockerfile
    container_name: csoj-sandbox
    restart: unless-stopped
    ports:
      - "${SANDBOX_PORT:-8090}:8090"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
      DOCKER_POOL_MAX_SIZE: ${DOCKER_POOL_MAX_SIZE:-20}
      DOCKER_POOL_MIN_SIZE: ${DOCKER_POOL_MIN_SIZE:-5}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - sandbox-logs:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - csoj-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 负载均衡
  nginx-lb:
    image: nginx:alpine
    container_name: csoj-nginx-lb
    restart: unless-stopped
    ports:
      - "${NGINX_LB_PORT:-80}:80"
      - "${NGINX_LB_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx-lb.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend-1
      - backend-2
    networks:
      - csoj-network

volumes:
  mysql-master-data:
    driver: local
  mysql-slave-data:
    driver: local
  redis-master-data:
    driver: local
  redis-slave-1-data:
    driver: local
  rabbitmq-data:
    driver: local
  backend-logs-1:
    driver: local
  backend-logs-2:
    driver: local
  backend-uploads:
    driver: local
  sandbox-logs:
    driver: local

networks:
  csoj-network:
    driver: bridge
