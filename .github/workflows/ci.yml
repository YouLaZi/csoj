# CSOJ Backend CI Pipeline
# 持续集成流水线：代码检查、测试、覆盖率、安全扫描

name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  JAVA_VERSION: '17'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: '-Xmx3072m -Duser.timezone=Asia/Shanghai'

jobs:
  # ========================================
  # Job 1: 代码质量检查
  # ========================================
  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better analysis

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Spotless Check
        working-directory: ./csoj-backend-master
        run: mvn spotless:check

      - name: Spotless Apply (if failed, show diff)
        if: failure()
        working-directory: ./csoj-backend-master
        run: mvn spotless:apply

      - name: Upload Spotless Diff
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotless-diff
          path: csoj-backend-master/

  # ========================================
  # Job 2: 单元测试 + 覆盖率
  # ========================================
  test:
    name: Unit Tests & Coverage
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: csoj_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -u root -proot123 --silent 2>/dev/null; then
              echo "MySQL is ready!"
              break
            fi
            echo "Waiting for MySQL... ($i/30)"
            sleep 2
          done

      - name: Run Tests with Coverage
        working-directory: ./csoj-backend-master
        # Skip integration tests that require full Spring context (MySQL, Redis, Elasticsearch)
        # Only run unit tests with Mockito
        # Use escaped exclamation mark to avoid bash history expansion
        run: mvn clean test jacoco:report -Dtest="\!**/*ServiceTest,\!**/*MapperTest,\!**/*DaoTest,**/*UnitTest"
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/csoj_test?useSSL=false&serverTimezone=Asia/Shanghai
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: root123
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./csoj-backend-master/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: csoj-backend-master/target/site/jacoco/
          retention-days: 30

      - name: Add Coverage Comment
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.6.1
        with:
          paths: ${{ github.workspace }}/csoj-backend-master/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 40
          min-coverage-changed-files: 60
          title: Code Coverage Report

  # ========================================
  # Job 3: 安全扫描
  # ========================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: code-quality

    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: 'csoj-backend'
          path: './csoj-backend-master/pom.xml'
          format: 'HTML'
          out: './dependency-check-report'
        continue-on-error: true

      - name: Upload Dependency Check Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: dependency-check-report/

      - name: Trivy Vulnerability Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './csoj-backend-master'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

  # ========================================
  # Job 4: 构建验证
  # ========================================
  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [test, security-scan]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: Build Package
        working-directory: ./csoj-backend-master
        run: mvn clean package -DskipTests

      - name: Check JAR File
        run: |
          if [ -f csoj-backend-master/target/csoj-backend-0.0.1-SNAPSHOT.jar ]; then
            echo "Build successful! JAR file created."
            ls -lh csoj-backend-master/target/*.jar
          else
            echo "Build failed! JAR file not found."
            exit 1
          fi

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: csoj-backend-jar
          path: csoj-backend-master/target/csoj-backend-0.0.1-SNAPSHOT.jar
          retention-days: 7

  # ========================================
  # Job 5: 代码质量分析 (SonarCloud)
  # ========================================
  sonarcloud:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs: [test]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: 'maven'

      - name: SonarCloud Scan
        working-directory: ./csoj-backend-master
        run: mvn sonar:sonar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        continue-on-error: true
