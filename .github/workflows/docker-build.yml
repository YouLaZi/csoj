# CSOJ Docker Image Build Pipeline
# 自动构建和发布 Docker 镜像

name: Docker Build

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE_NAME: ${{ github.repository }}/csoj-backend
  SANDBOX_IMAGE_NAME: ${{ github.repository }}/csoj-sandbox

jobs:
  # ========================================
  # Job 1: 构建后端 Docker 镜像
  # ========================================
  build-backend:
    name: Build Backend Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      primary-tag: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./csoj-backend-master
          file: ./csoj-backend-master/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Image SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.json
          artifact-name: backend-sbom
        continue-on-error: true

      - name: Trivy Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: 'docker-image-backend'
        continue-on-error: true

  # ========================================
  # Job 2: 构建代码沙箱 Docker 镜像
  # ========================================
  build-sandbox:
    name: Build Sandbox Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
      primary-tag: ${{ fromJSON(steps.meta.outputs.json).tags[0] }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.SANDBOX_IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and Push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./csoj-code-sandbox-master
          file: ./csoj-code-sandbox-master/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trivy Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.SANDBOX_IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: 'sarif'
          output: 'trivy-sandbox-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy Results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-sandbox-results.sarif'
          category: 'docker-image-sandbox'
        continue-on-error: true

  # ========================================
  # Job 3: 多架构测试
  # ========================================
  test-images:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs: [build-backend, build-sandbox]
    if: github.event_name != 'pull_request'

    steps:
      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull and Test Backend Image
        run: |
          echo "Pulling backend image: ${{ needs.build-backend.outputs.primary-tag }}"
          docker pull ${{ needs.build-backend.outputs.primary-tag }}
          echo "Inspecting backend image..."
          docker inspect ${{ needs.build-backend.outputs.primary-tag }}
          echo "Testing backend image - checking Java version..."
          docker run --rm --entrypoint="" ${{ needs.build-backend.outputs.primary-tag }} java -version

      - name: Pull and Test Sandbox Image
        run: |
          echo "Pulling sandbox image: ${{ needs.build-sandbox.outputs.primary-tag }}"
          docker pull ${{ needs.build-sandbox.outputs.primary-tag }}
          echo "Inspecting sandbox image..."
          docker inspect ${{ needs.build-sandbox.outputs.primary-tag }}
          echo "Sandbox image pulled successfully!"

  # ========================================
  # Job 4: 生成部署摘要
  # ========================================
  deploy-summary:
    name: Deployment Summary
    runs-on: ubuntu-latest
    needs: [build-backend, build-sandbox]
    if: always() && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - name: Generate Deployment Summary
        run: |
          echo "# 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Docker Images Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image Tag | Digest |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`${{ needs.build-backend.outputs.primary-tag }}\` | \`${{ needs.build-backend.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sandbox | \`${{ needs.build-sandbox.outputs.primary-tag }}\` | \`${{ needs.build-sandbox.outputs.image-digest }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Pull Commands" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "# Pull Backend" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ needs.build-backend.outputs.primary-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Pull Sandbox" >> $GITHUB_STEP_SUMMARY
          echo "docker pull ${{ needs.build-sandbox.outputs.primary-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
