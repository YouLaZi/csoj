<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <!-- 背景 -->
  <rect width="800" height="600" fill="#f8f9fa" />
  
  <!-- 标题 -->
  <text x="400" y="40" font-family="Arial" font-size="24" text-anchor="middle" font-weight="bold">CSOJ 代码沙箱多语言支持架构</text>
  
  <!-- 中心接口 -->
  <rect x="300" y="100" width="200" height="80" rx="10" ry="10" fill="#4285f4" opacity="0.8" />
  <text x="400" y="145" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">CodeSandboxStrategy</text>
  <text x="400" y="165" font-family="Arial" font-size="12" text-anchor="middle" fill="white">接口</text>
  
  <!-- 工厂类 -->
  <rect x="300" y="220" width="200" height="80" rx="10" ry="10" fill="#34a853" opacity="0.8" />
  <text x="400" y="265" font-family="Arial" font-size="16" text-anchor="middle" fill="white" font-weight="bold">CodeSandboxFactory</text>
  <text x="400" y="285" font-family="Arial" font-size="12" text-anchor="middle" fill="white">工厂类</text>
  
  <!-- 语言实现 -->
  <!-- Java -->
  <rect x="50" y="350" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="120" y="385" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">JavaLanguageStrategy</text>
  
  <!-- Python -->
  <rect x="200" y="350" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="270" y="385" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">PythonLanguageStrategy</text>
  
  <!-- C++ -->
  <rect x="350" y="350" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="420" y="385" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">CppLanguageStrategy</text>
  
  <!-- C# -->
  <rect x="500" y="350" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="570" y="385" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">CSharpLanguageStrategy</text>
  
  <!-- JavaScript -->
  <rect x="650" y="350" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="720" y="385" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">JavaScriptLanguageStrategy</text>
  
  <!-- 其他语言 -->
  <rect x="125" y="450" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="195" y="485" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">GoLanguageStrategy</text>
  
  <rect x="275" y="450" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="345" y="485" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">RubyLanguageStrategy</text>
  
  <rect x="425" y="450" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" />
  <text x="495" y="485" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">SwiftLanguageStrategy</text>
  
  <rect x="575" y="450" width="140" height="60" rx="10" ry="10" fill="#fbbc05" opacity="0.8" stroke="#fbbc05" stroke-width="2" stroke-dasharray="5,3" />
  <text x="645" y="485" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">新语言Strategy...</text>
  
  <!-- 连接线 -->
  <!-- 接口到工厂 -->
  <line x1="400" y1="180" x2="400" y2="220" stroke="#333" stroke-width="2" />
  <polygon points="395,210 400,220 405,210" fill="#333" />
  
  <!-- 工厂到各语言实现 -->
  <line x1="400" y1="300" x2="400" y2="320" stroke="#333" stroke-width="2" />
  <line x1="400" y1="320" x2="120" y2="320" stroke="#333" stroke-width="2" />
  <line x1="120" y1="320" x2="120" y2="350" stroke="#333" stroke-width="2" />
  <polygon points="115,340 120,350 125,340" fill="#333" />
  
  <line x1="400" y1="320" x2="270" y2="320" stroke="#333" stroke-width="2" />
  <line x1="270" y1="320" x2="270" y2="350" stroke="#333" stroke-width="2" />
  <polygon points="265,340 270,350 275,340" fill="#333" />
  
  <line x1="400" y1="320" x2="420" y2="320" stroke="#333" stroke-width="2" />
  <line x1="420" y1="320" x2="420" y2="350" stroke="#333" stroke-width="2" />
  <polygon points="415,340 420,350 425,340" fill="#333" />
  
  <line x1="400" y1="320" x2="570" y2="320" stroke="#333" stroke-width="2" />
  <line x1="570" y1="320" x2="570" y2="350" stroke="#333" stroke-width="2" />
  <polygon points="565,340 570,350 575,340" fill="#333" />
  
  <line x1="400" y1="320" x2="720" y2="320" stroke="#333" stroke-width="2" />
  <line x1="720" y1="320" x2="720" y2="350" stroke="#333" stroke-width="2" />
  <polygon points="715,340 720,350 725,340" fill="#333" />
  
  <!-- 第二行语言 -->
  <line x1="120" y1="320" x2="120" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="120" y1="430" x2="195" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="195" y1="430" x2="195" y2="450" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="190,440 195,450 200,440" fill="#333" />
  
  <line x1="270" y1="320" x2="270" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="270" y1="430" x2="345" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="345" y1="430" x2="345" y2="450" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="340,440 345,450 350,440" fill="#333" />
  
  <line x1="420" y1="320" x2="420" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="420" y1="430" x2="495" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="495" y1="430" x2="495" y2="450" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="490,440 495,450 500,440" fill="#333" />
  
  <line x1="570" y1="320" x2="570" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="570" y1="430" x2="645" y2="430" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <line x1="645" y1="430" x2="645" y2="450" stroke="#333" stroke-width="2" stroke-dasharray="5,3" />
  <polygon points="640,440 645,450 650,440" fill="#333" />
  
  <!-- 说明框 -->
  <rect x="50" y="530" width="700" height="50" rx="5" ry="5" fill="white" stroke="#333" stroke-width="1" />
  <text x="400" y="555" font-family="Arial" font-size="14" text-anchor="middle">通过策略模式和工厂模式，可以轻松扩展支持新的编程语言，只需实现CodeSandboxStrategy接口</text>
  <text x="400" y="575" font-family="Arial" font-size="14" text-anchor="middle">并在工厂类中注册即可，无需修改现有代码</text>
</svg>